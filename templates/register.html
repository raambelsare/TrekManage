{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="auth-form-container" style="max-width:540px;">

        <div class="text-center mb-4">
            <h3 class="mt-2 mb-0">Create your account</h3>
            <p class="text-muted small mt-1 mb-0">Join as a Trekker or apply as Trek Staff</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">

            <div class="mb-4">
                <label class="form-label">I am registering as</label>
                <div class="d-flex gap-2" id="roleToggle">
                    <input type="radio" class="btn-check" name="role" id="roleUser" value="user"
                           {% if form.get('role', 'user') == 'user' %}checked{% endif %}>
                    <label class="btn btn-outline-brand flex-fill" for="roleUser">
                        Trekker
                    </label>

                    <input type="radio" class="btn-check" name="role" id="roleStaff" value="staff"
                           {% if form.get('role') == 'staff' %}checked{% endif %}>
                    <label class="btn btn-outline-brand flex-fill" for="roleStaff">
                        Trek Staff
                    </label>
                </div>
                <div class="form-text mt-1" id="staffNote" style="{% if form.get('role') != 'staff' %}display:none;{% endif %}">
                    Staff accounts require admin approval before you can log in.
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="name">Full Name *</label>
                    <input type="text" class="form-control" id="name" name="name"
                           value="{{ form.get('name', '') }}" placeholder="Your full name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="username">Username *</label>
                    <input type="text" class="form-control" id="username" name="username"
                           value="{{ form.get('username', '') }}" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email *</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ form.get('email', '') }}" placeholder="your@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="phone">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone"
                       value="{{ form.get('phone', '') }}" placeholder="Optional contact number">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="password">Password *</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Min. 6 characters" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePwd">Show</button>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="confirm_password">Confirm Password *</label>
                    <input type="password" class="form-control" id="confirm_password"
                           name="confirm_password" placeholder="Repeat password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-brand w-100 py-2 mt-1">
                Create Account
            </button>
        </form>

        <p class="text-center small text-muted mt-4 mb-0">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-forest fw-600">Log in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelectorAll('input[name="role"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
            var note = document.getElementById('staffNote');
            note.style.display = this.value === 'staff' ? 'block' : 'none';
        });
    });

    document.getElementById('togglePwd').addEventListener('click', function () {
        var input = document.getElementById('password');
        if (input.type === 'password') {
            input.type = 'text';
            this.textContent = 'Hide';
        } else {
            input.type = 'password';
            this.textContent = 'Show';
        }
    });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="auth-form-container" style="max-width:440px;">

        <div class="text-center mb-4">
            <h3 class="mt-2 mb-0">Welcome back</h3>
            <p class="text-muted small mt-1 mb-0">Sign in to your TrekManage account</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">Show</button>
                </div>
            </div>

            <button type="submit" class="btn btn-brand w-100 py-2 mt-2">
                Log In
            </button>
        </form>

        <p class="text-center small text-muted mt-4 mb-3">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="text-forest fw-600">Sign up here</a>
        </p>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        var input = document.getElementById('password');
        if (input.type === 'password') {
            input.type = 'text';
            this.textContent = 'Hide';
        } else {
            input.type = 'password';
            this.textContent = 'Show';
        }
    });
</script>
{% endblock %}
